<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="food-fly-layer" aria-hidden="true">
    <span class="food-fly left lane-1">🍔</span>
    <span class="food-fly right lane-2">🍕</span>
    <span class="food-fly left lane-7">🍟</span>
    <span class="food-fly right lane-8">🌮</span>
  </div>

  <header>
    <div class="header-row">
      <div>
        <h1>Canteen Menu</h1>
        <p id="menu-canteen-title">Loading canteen...</p>
      </div>
      <div style="display:flex; gap:0.6rem; flex-wrap:wrap;">
        <a class="ghost-btn" href="canteens.html" style="display:inline-block; padding:0.84rem 1rem; text-decoration:none;">Back to Canteens</a>
        <a class="ghost-btn" href="cart.html" style="display:inline-block; padding:0.84rem 1rem; text-decoration:none;">Go to Cart</a>
      </div>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="toolbar-grid">
        <label>Search Items
          <input type="text" id="menu-search" placeholder="Search food or drink" />
        </label>
        <label>Availability
          <select id="menu-availability-filter">
            <option value="all">All Items</option>
            <option value="available">Available Only</option>
          </select>
        </label>
        <label>Sort
          <select id="menu-sort">
            <option value="popular">Popular</option>
            <option value="priceAsc">Price Low to High</option>
            <option value="priceDesc">Price High to Low</option>
            <option value="nameAsc">Name A-Z</option>
          </select>
        </label>
      </div>
      <div id="menu-list"></div>
      <div class="small-panel">
        <h3>Favorite Items</h3>
        <div id="favorites-list"></div>
      </div>
      <div class="message" id="menu-message"></div>
    </section>
  </main>

  <script src="js/student-common.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/menu.js"></script>
</body>
</html>
