<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="food-fly-layer" aria-hidden="true">
    <span class="food-fly left lane-1">🍔</span>
    <span class="food-fly right lane-2">🍕</span>
    <span class="food-fly left lane-7">🍟</span>
    <span class="food-fly right lane-8">🌮</span>
    <span class="food-fly left lane-9">🌯</span>
    <span class="food-fly right lane-10">🥪</span>
  </div>

  <header>
    <div class="header-row">
      <div>
        <h1>K-Bites Admin Panel</h1>
        <p>Review and approve canteen registration requests.</p>
      </div>
    </div>
  </header>

  <main>
    <section class="panel" id="admin-login-panel">
      <h2>Admin Login</h2>
      <form id="admin-login-form">
        <label>Admin Password
          <input type="password" id="admin-password" required placeholder="Enter admin password" />
        </label>
        <button type="submit">Login</button>
      </form>
      <div class="message" id="admin-message"></div>
    </section>

    <section class="panel hidden" id="admin-dashboard-panel">
      <div class="owner-status-row">
        <h2>Pending Canteen Requests</h2>
        <button type="button" id="refresh-pending-btn" class="ghost-btn">Refresh</button>
      </div>
      <div id="pending-requests-list"></div>
    </section>
  </main>

  <script src="js/cursor.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
