<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="food-fly-layer" aria-hidden="true">
    <span class="food-fly left lane-1">🍔</span>
    <span class="food-fly right lane-2">🍕</span>
    <span class="food-fly left lane-7">🍟</span>
    <span class="food-fly right lane-8">🌮</span>
  </div>

  <header>
    <div class="header-row">
      <div>
        <h1>Your Cart</h1>
        <p id="cart-canteen-title">Review items and place the order.</p>
      </div>
      <div style="display:flex; gap:0.6rem; flex-wrap:wrap;">
        <a class="ghost-btn" href="menu.html" style="display:inline-block; padding:0.84rem 1rem; text-decoration:none;">Back to Menu</a>
        <a class="ghost-btn" href="canteens.html" style="display:inline-block; padding:0.84rem 1rem; text-decoration:none;">Change Canteen</a>
      </div>
    </div>
  </header>

  <main>
    <section class="panel">
      <h2>Cart Summary</h2>
      <div id="cart-items"></div>
      <div id="cart-total"></div>
      <label>Pickup Slot
        <select id="pickup-slot">
          <option value="ASAP">ASAP (Fastest)</option>
          <option value="10-20 min">10-20 min</option>
          <option value="20-30 min">20-30 min</option>
          <option value="Lunch Break Slot">Lunch Break Slot</option>
        </select>
      </label>
      <label>Payment Method
        <select id="payment-method">
          <option value="Cash">Cash</option>
        </select>
      </label>
      <button id="place-order-btn">Place Order</button>
      <div class="message" id="order-message"></div>
    </section>
  </main>

  <script src="js/student-common.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
