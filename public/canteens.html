<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Canteen</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="food-fly-layer" aria-hidden="true">
    <span class="food-fly left lane-1">🍔</span>
    <span class="food-fly right lane-2">🍕</span>
    <span class="food-fly left lane-7">🍟</span>
    <span class="food-fly right lane-8">🌮</span>
  </div>

  <header>
    <div class="header-row">
      <div>
        <h1>Select Your Canteen</h1>
        <p>Choose the canteen first, then continue to the menu page.</p>
      </div>
      <div style="display:flex; gap:0.6rem; flex-wrap:wrap;">
        <a class="ghost-btn" href="index.html" style="display:inline-block; padding:0.84rem 1rem; text-decoration:none;">Home</a>
        <a class="ghost-btn" href="cart.html" style="display:inline-block; padding:0.84rem 1rem; text-decoration:none;">Cart</a>
      </div>
    </div>
  </header>

  <main>
    <section class="panel">
      <h2>Canteens</h2>
      <label>Search Canteen
        <input type="text" id="canteen-search" placeholder="Search by name or location" />
      </label>
      <div id="canteen-list"></div>
      <div class="message" id="canteen-message"></div>
    </section>
  </main>

  <script src="js/student-common.js"></script>
  <script src="js/cursor.js"></script>
  <script src="js/canteens.js"></script>
</body>
</html>
